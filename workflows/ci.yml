name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra code --extra dev
      - run: uv run ruff check src tests
      - run: uv run mypy src/blazing_rag_mcp
      - run: uv run bandit -q -r src/blazing_rag_mcp
      - run: uv run pytest -q
      - run: uv build
